name: build

# Build muEye across the target platforms:
#   * Linux   — x86_64 and ARM64
#   * Windows — x86_64 and ARM64
#   * macOS   — ARM64 (Apple Silicon)
#
# muEye consumes muGrid via add_subdirectory, so each job checks out muGrid
# alongside it. Dependencies: NetCDF (system on Linux/macOS, vcpkg on Windows),
# OpenGL, plus GLFW + Dear ImGui which the build fetches automatically.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # muGrid dependency. Pin MUGRID_REF to a tag (e.g. "0.110.0") for reproducible
  # builds; "main" tracks the latest.
  MUGRID_REPO: muSpectre/muGrid
  MUGRID_REF: main

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   runner: ubuntu-24.04,     os: linux,   triplet: "" }
          - { name: linux-arm64,    runner: ubuntu-24.04-arm, os: linux,   triplet: "" }
          - { name: macos-arm64,    runner: macos-14,         os: macos,   triplet: "" }
          - { name: windows-x86_64, runner: windows-latest,   os: windows, triplet: x64-windows }
          - { name: windows-arm64,  runner: windows-11-arm,   os: windows, triplet: arm64-windows }

    steps:
      - name: Checkout muEye
        uses: actions/checkout@v4
        with:
          path: muEye

      - name: Checkout muGrid (dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MUGRID_REPO }}
          ref: ${{ env.MUGRID_REF }}
          path: muGrid

      # ------------------------------------------------------------------ deps
      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libnetcdf-dev libgl1-mesa-dev libglu1-mesa-dev xorg-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install netcdf pkg-config ninja

      - name: Export vcpkg GitHub Actions cache variables (Windows)
        if: matrix.os == 'windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ------------------------------------------------------------- configure
      - name: Configure (Linux / macOS)
        if: matrix.os != 'windows'
        run: >
          cmake -S muEye -B muEye/build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DMUEYE_MUGRID_SOURCE_DIR=${{ github.workspace }}/muGrid

      - name: Configure (Windows)
        if: matrix.os == 'windows'
        # vcpkg (manifest mode) provides NetCDF; binaries are cached in the
        # GitHub Actions cache to speed up subsequent runs.
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: >
          cmake -S muEye -B muEye/build
          -DCMAKE_BUILD_TYPE=Release
          -DMUEYE_MUGRID_SOURCE_DIR=${{ github.workspace }}/muGrid
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}

      # ----------------------------------------------------------------- build
      - name: Build muEye
        run: cmake --build muEye/build --config Release --parallel

      # Headless smoke test: writes a demo .nc via muGrid, reads it back and
      # ray-traces offscreen (no display needed). Skipped on Windows to avoid
      # runtime DLL-path setup for the vcpkg NetCDF/HDF5 libraries.
      - name: Smoke test (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          cmake --build muEye/build --target muEye_check --parallel
          (cd muEye/build && ./muEye_check demo.nc 32)
